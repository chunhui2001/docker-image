
## 安装Docker Compose
# curl -L https://github.com/docker/compose/releases/download/1.24.1/docker-compose-`uname -s`-`uname -m` > /usr/local/bin/docker-compose
# chmod +x /usr/local/bin/docker-compose
# docker-compose --version
# docker-compose up -d

version: '2.4'
networks:
  br0:
    external: true

services:
  grafana_12.4:
    container_name: grafana_12.4
    image: chunhui2001/ubuntu_25.10:grafana_12.4
    hostname: grafana_12.4
    #mem_limit: 100m
    ports:
      - 3101:3000
    #entrypoint: ["/bin/sh", "-c", "while true; do echo 1 >/dev/null 2>/dev/null; sleep 1; done"]
    entrypoint: ["entrypont.sh"]
    volumes:
     - ./entrypont.sh:/usr/bin/entrypont.sh:ro
     #- ./conf/defaults.ini:/opt/grafana/conf/defaults.ini:ro
     - ./conf/sample.ini:/opt/grafana/conf/defaults.ini:ro
    restart: always
    networks:
        br0:
          ipv4_address: 172.16.197.126
