

#### zero4go
frontend zero4rs_proxy                              
  log global                                        
  log-format "%ci:%cp %ft %b %s %TR %ST %HP %HU"    
  bind *:8365 alpn h2,http/1.1   
  
  mode tcp
  option tcplog

  default_backend zero4rs_servers                   

backend zero4rs_servers    
  mode tcp              
  server app1 envoy-1.38.1:19200 check     # check: 定期 ping backend, 如果挂了 → 自动摘流量, 恢复后自动加入
  



