

#### envoy server
frontend envoy_proxy                              
  log global                                        
  log-format "%ci:%cp %ft %b %s %TR %ST %HP %HU"    
  bind *:8368 alpn h2,http/1.1                      
  default_backend envoy_servers   

backend envoy_servers
  server app1 envoy-1.38.1:10000 check proto h2        
