
#### infura_mainnet server
frontend infura_mainnet_proxy                              
  log global                                        
  log-format "%ci:%cp %ft %b %s %TR %ST %HP %HU"    
  bind *:8363 alpn h2,http/1.1                      
  default_backend infura_mainnet_servers   

backend infura_mainnet_servers
  server app1 envoy-1.38.1:19936 check proto h2        
