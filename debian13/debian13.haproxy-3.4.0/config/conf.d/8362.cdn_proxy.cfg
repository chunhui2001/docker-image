
#### cdn server
frontend cdn_proxy_8362                              
  log global                                        
  log-format "%ci:%cp %ft %b %s %TR %ST %HP %HU"    
  bind *:8362 alpn h2,http/1.1                      
  default_backend cdn_servers   

backend cdn_servers
  server app1 envoy-1.38.1:19001 check proto h2        
