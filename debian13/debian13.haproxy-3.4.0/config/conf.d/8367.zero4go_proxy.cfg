

#### zero4go
frontend zero4go_proxy                              
  log global                                        
  log-format "%ci:%cp %ft %b %s %TR %ST %HP %HU"    
  bind *:8367 alpn h2,http/1.1   
  
  mode tcp
  option tcplog

  default_backend zero4go_servers                   

backend zero4go_servers    
  mode tcp              
  server app1 envoy-1.38.1:18111 check   
