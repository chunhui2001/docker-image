
#### mylab2013 blog
frontend blog_proxy_8361                              
  log global                                        
  log-format "%ci:%cp %ft %b %s %TR %ST %HP %HU"    
  bind *:8361 alpn h2,http/1.1                      
  default_backend blog_servers   

backend blog_servers                                   
  server app1 envoy-1.38.1:16600 check proto h2        
