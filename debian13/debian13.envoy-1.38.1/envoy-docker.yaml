        #                           <meta charset="utf-8"/>
        #                           <title>xDS Control plane</title>
        #                         </head>
        #                           <body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
        #                             <h1>Waiting for xDS...</h1>
        #                             <p>Control plane not ready yet.</p>
        #                           </body>
        #                         </html>
        #                   response_headers_to_add:
        #                     - header:
        #                         key: content-type
        #                         value: text/html; charset=UTF-8
        #                       append_action: OVERWRITE_IF_EXISTS_OR_ADD
        #         http_filters:
        #           - name: envoy.filters.http.router
        #             typed_config:
        #               "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: xds_cluster
      connect_timeout: 5s
      type: LOGICAL_DNS
      http2_protocol_options: {}
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: xds_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      # address: host.docker.internal
                      address: xds-envoy-plane
                      port_value: 18100
                metadata:
                  filter_metadata:
                    edpt.envoy.lb:
                      protocol: grpc

dynamic_resources:
  ads_config:
    # api_type: GRPC
    api_type: DELTA_GRPC
    # transport_api_version: V3
    grpc_services:
      - envoy_grpc:
          cluster_name: xds_cluster

  lds_config:
    ads: {}
  cds_config:
    ads: {}
